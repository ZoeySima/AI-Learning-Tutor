<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>学习中 - AI Learning Tutor</title>
  <link rel="stylesheet" href="/static/css/tokens.css">
  <style>
    body { margin: 0; display: flex; flex-direction: column; height: 100vh; }
    .topbar {
      height: 56px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 24px;
      background: var(--bg-elevated);
      gap: 16px;
    }
    .topbar h1 { font-size: 18px; flex: 1; font-weight: 600; }
    .topbar a { color: var(--text-soft); text-decoration: none; font-size: 14px; }
    .topbar a:hover { color: var(--text); }

    .body-wrap {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    .sidebar {
      width: 240px;
      border-right: 1px solid var(--border);
      background: var(--bg-elevated);
      padding: 24px 16px;
      overflow-y: auto;
    }
    .sidebar h3 {
      font-size: 14px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
    }
    .chapter-list {
      list-style: none;
      margin-bottom: 32px;
    }
    .chapter-item {
      padding: 8px 12px;
      border-radius: 6px;
      cursor: pointer;
      color: var(--text-soft);
      margin-bottom: 4px;
      font-size: 14px;
      transition: all 0.2s;
    }
    .chapter-item:hover { background: var(--bg-subtle); }
    .chapter-item.active {
      background: var(--bg-subtle);
      color: var(--text);
      font-weight: 600;
    }
    .chapter-item.completed { color: var(--text); }
    .chapter-status { display: inline-block; width: 16px; }

    .progress-section {
      padding: 16px 12px;
      border-top: 1px solid var(--border);
    }
    .progress-bar {
      height: 4px;
      background: var(--bg-subtle);
      border-radius: 2px;
      overflow: hidden;
      margin-top: 8px;
    }
    .progress-fill {
      height: 100%;
      background: var(--accent);
      width: 0;
    }
    .progress-text {
      font-size: 13px;
      color: var(--text-soft);
    }

    .main { flex: 1; overflow-y: auto; padding: 24px; }
    .chat-flow { max-width: 720px; margin: 0 auto; }
    .message {
      margin-bottom: 32px;
      padding: 16px;
      border-radius: var(--radius-md);
    }
    .message.ai {
      background: var(--bg-subtle);
    }
    .message.user {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      margin-left: 80px;
    }

    @media (max-width: 768px) {
      .sidebar { display: none; }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <h1 id="topicTitle">加载中...</h1>
    <a href="/sessions">所有会话</a>
    <a href="#" id="exportLink">导出笔记</a>
    <a href="/">首页</a>
  </div>

  <div class="body-wrap">
    <aside class="sidebar">
      <h3>章节</h3>
      <ul class="chapter-list" id="chapterList">
        <li style="color: var(--text-muted); font-size: 13px;">加载中...</li>
      </ul>

      <div class="progress-section">
        <div class="progress-text" id="progressText">进度：0/0</div>
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
      </div>
    </aside>

    <main class="main">
      <div class="chat-flow" id="chatFlow"></div>
    </main>
  </div>

  <script src="/static/js/lib/gsap.min.js"></script>
  <script src="/static/js/animations.js"></script>
  <script src="/static/js/learn.js"></script>
</body>
</html>
